<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VISNAM SUPPORT SYSTEM</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#020617;
    color:white;
}

/* Scroll */

::-webkit-scrollbar{
    width:6px;
    height:6px;
}

::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

/* Card */

.card{
    background:rgba(15,23,42,.8);
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

/* Glow */

.glow{
    box-shadow:0 0 25px rgba(14,165,233,.2);
}

/* Hover table */

tbody tr:hover{
    background:rgba(30,41,59,.7);
}

/* Snow */

.snowflake{
    position:fixed;
    top:-10vh;
    color:white;
    opacity:.4;
    pointer-events:none;
    z-index:1;
    animation:fall linear infinite;
}

@keyframes fall{

    from{
        transform:translateY(-10vh);
    }

    to{
        transform:translateY(110vh);
    }

}

</style>

</head>

<body class="min-h-screen overflow-x-hidden">

<!-- TUYẾT -->

<div id="snow"></div>

<!-- HEADER -->

<header class="h-16 border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-5 h-full flex items-center justify-between">

        <div class="flex items-center gap-4">

            <div class="w-11 h-11 rounded-2xl bg-sky-500/20 flex items-center justify-center glow">

                <i class="fas fa-building text-sky-400 text-xl"></i>

            </div>

            <div>

                <h1 class="font-bold text-lg tracking-wider">
                    VISNAM SUPPORT SYSTEM
                </h1>

                <p class="text-[11px] text-slate-400">
                    Hệ thống hỗ trợ khách hàng
                </p>

            </div>

        </div>

        <button
        onclick="exportExcel()"
        class="bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-xl font-bold text-sm">

            <i class="fas fa-file-excel mr-2"></i>
            Xuất Excel

        </button>

    </div>

</header>

<!-- MAIN -->

<main class="max-w-7xl mx-auto p-5 relative z-10">

    <!-- THỐNG KÊ -->

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

        <div class="card rounded-3xl p-5">

            <p class="text-slate-400 text-sm">
                Tổng hỗ trợ hôm nay
            </p>

            <h2
            id="tongHomNay"
            class="text-3xl font-bold text-sky-400 mt-2">
                0
            </h2>

        </div>

        <div class="card rounded-3xl p-5">

            <p class="text-slate-400 text-sm">
                Hóa đơn
            </p>

            <h2
            id="tongHD"
            class="text-3xl font-bold text-pink-400 mt-2">
                0
            </h2>

        </div>

        <div class="card rounded-3xl p-5">

            <p class="text-slate-400 text-sm">
                Chữ ký số
            </p>

            <h2
            id="tongCKS"
            class="text-3xl font-bold text-yellow-400 mt-2">
                0
            </h2>

        </div>

        <div class="card rounded-3xl p-5">

            <p class="text-slate-400 text-sm">
                BHXH
            </p>

            <h2
            id="tongBHXH"
            class="text-3xl font-bold text-emerald-400 mt-2">
                0
            </h2>

        </div>

    </div>

    <!-- FORM -->

    <div class="card rounded-3xl p-6 mb-6 glow">

        <div class="flex items-center justify-between mb-6">

            <h2 class="text-2xl font-bold">
                Nhập thông tin hỗ trợ
            </h2>

            <div
            id="msg"
            class="text-emerald-400 font-bold text-sm">
            </div>

        </div>

        <!-- ROW -->

        <div class="grid md:grid-cols-2 gap-5">

            <!-- MST -->

            <div>

                <label class="text-sm text-slate-300 block mb-2">
                    Mã số thuế
                </label>

                <div class="flex gap-2">

                    <input
                    type="text"
                    id="mst"
                    placeholder="Nhập mã số thuế..."
                    class="flex-1 bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white">

                    <button
                    onclick="traCuuMST()"
                    class="bg-sky-500 hover:bg-sky-600 px-5 rounded-2xl font-bold">

                        <i class="fas fa-search"></i>

                    </button>

                </div>

            </div>

            <!-- SDT -->

            <div>

                <label class="text-sm text-slate-300 block mb-2">
                    Số điện thoại
                </label>

                <input
                type="text"
                id="sdt"
                placeholder="Nhập số điện thoại..."
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white">

            </div>

        </div>

        <!-- TÊN CTY -->

        <div class="mt-5">

            <label class="text-sm text-slate-300 block mb-2">
                Tên doanh nghiệp
            </label>

            <input
            type="text"
            id="tencty"
            placeholder="Tên doanh nghiệp..."
            class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white">

        </div>

        <!-- LOẠI -->

        <div class="grid md:grid-cols-2 gap-5 mt-5">

            <div>

                <label class="text-sm text-slate-300 block mb-2">
                    Loại hỗ trợ
                </label>

                <select
                id="loai"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white">

                    <option>HD</option>
                    <option>CKS</option>
                    <option>BHXH</option>

                </select>

            </div>

            <div>

                <label class="text-sm text-slate-300 block mb-2">
                    Vấn đề hỗ trợ
                </label>

                <input
                type="text"
                id="vanDe"
                placeholder="Nhập vấn đề hỗ trợ..."
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white">

            </div>

        </div>

        <!-- BUTTON -->

        <button
        onclick="luuThongTin()"
        class="w-full mt-6 bg-gradient-to-r from-sky-500 to-blue-600 hover:opacity-90 py-4 rounded-2xl text-lg font-bold glow">

            <i class="fas fa-save mr-2"></i>
            LƯU THÔNG TIN

        </button>

    </div>

    <!-- TABLE -->

    <div class="card rounded-3xl overflow-hidden">

        <!-- TOP -->

        <div class="p-5 border-b border-slate-800 flex flex-col md:flex-row md:items-center justify-between gap-3">

            <h2 class="text-xl font-bold">
                Bảng dữ liệu hỗ trợ
            </h2>

            <input
            type="text"
            id="search"
            onkeyup="timKiem()"
            placeholder="Tìm MST hoặc tên công ty..."
            class="bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white w-full md:w-[320px]">

        </div>

        <!-- TABLE -->

        <div class="overflow-auto max-h-[650px]">

            <table class="w-full text-sm">

                <thead class="bg-slate-950 sticky top-0 z-20">

                    <tr>

                        <th class="p-4 text-left text-sky-400">STT</th>
                        <th class="p-4 text-left text-sky-400">Ngày</th>
                        <th class="p-4 text-left text-sky-400">MST</th>
                        <th class="p-4 text-left text-sky-400">SĐT</th>
                        <th class="p-4 text-left text-sky-400">Tên doanh nghiệp</th>
                        <th class="p-4 text-left text-sky-400">Loại</th>
                        <th class="p-4 text-left text-sky-400">Tên hỗ trợ</th>
                        <th class="p-4 text-left text-sky-400">Vấn đề</th>

                    </tr>

                </thead>

                <tbody id="tableData">

                </tbody>

            </table>

        </div>

    </div>

</main>

<script>

/* ======================= */
/* TUYẾT */
/* ======================= */

for(let i=0;i<70;i++){

    let snow = document.createElement("div");

    snow.className = "snowflake";

    snow.innerHTML = "❄";

    snow.style.left = Math.random()*100+"vw";

    snow.style.fontSize = (Math.random()*12+8)+"px";

    snow.style.animationDuration =
    (Math.random()*10+10)+"s";

    snow.style.opacity = Math.random();

    document.body.appendChild(snow);
}

/* ======================= */
/* DATA */
/* ======================= */

let dsHoTro =
JSON.parse(localStorage.getItem("dsHoTro")) || [];

renderTable();

capNhatThongKe();

/* ======================= */
/* TRA CỨU MST */
/* ======================= */

async function traCuuMST(){

    let mst =
    document.getElementById("mst").value.trim();

    if(!mst){

        alert("Vui lòng nhập MST");

        return;
    }

    try{

        let res =
        await fetch(
        "https://api.vietqr.io/v2/business/" + mst
        );

        let data = await res.json();

        if(data.code == "00"){

            document.getElementById("tencty").value =
            data.data.name;

            thongBao("Tra cứu thành công");

        }else{

            alert("Không tìm thấy MST");

        }

    }catch(e){

        alert("API lỗi hoặc bị chặn");

    }

}

/* ======================= */
/* LƯU */
/* ======================= */

function luuThongTin(){

    let mst =
    document.getElementById("mst").value;

    let sdt =
    document.getElementById("sdt").value;

    let tencty =
    document.getElementById("tencty").value;

    let loai =
    document.getElementById("loai").value;

    let vanDe =
    document.getElementById("vanDe").value;

    if(!mst || !tencty){

        alert("Thiếu dữ liệu");

        return;
    }

    let now = new Date();

    let ngay =
    now.getDate().toString().padStart(2,'0')
    + "/"
    + (now.getMonth()+1).toString().padStart(2,'0')
    + "/"
    + now.getFullYear();

    dsHoTro.unshift({

        ngay,
        mst,
        sdt,
        tencty,
        loai,
        nguoiHoTro:"Dũng",
        vanDe

    });

    localStorage.setItem(
    "dsHoTro",
    JSON.stringify(dsHoTro)
    );

    renderTable();

    capNhatThongKe();

    thongBao("Đã lưu dữ liệu");

    document.getElementById("mst").value="";
    document.getElementById("sdt").value="";
    document.getElementById("tencty").value="";
    document.getElementById("vanDe").value="";
}

/* ======================= */
/* TABLE */
/* ======================= */

function renderTable(data = dsHoTro){

    let html = "";

    data.forEach((item,index)=>{

        html += `

        <tr class="border-t border-slate-800">

            <td class="p-4 font-bold text-yellow-400">
                ${index+1}
            </td>

            <td class="p-4 text-slate-300">
                ${item.ngay}
            </td>

            <td class="p-4 text-sky-400">
                ${item.mst}
            </td>

            <td class="p-4 text-slate-300">
                ${item.sdt}
            </td>

            <td class="p-4 text-white font-semibold">
                ${item.tencty}
            </td>

            <td class="p-4 text-pink-400">
                ${item.loai}
            </td>

            <td class="p-4 text-emerald-400">
                Dũng
            </td>

            <td class="p-4 text-slate-300">
                ${item.vanDe}
            </td>

        </tr>

        `;

    });

    document.getElementById("tableData").innerHTML =
    html;
}

/* ======================= */
/* SEARCH */
/* ======================= */

function timKiem(){

    let value =
    document.getElementById("search")
    .value
    .toLowerCase();

    let loc =
    dsHoTro.filter(item =>

        item.mst.toLowerCase().includes(value)
        ||
        item.tencty.toLowerCase().includes(value)

    );

    renderTable(loc);
}

/* ======================= */
/* THỐNG KÊ */
/* ======================= */

function capNhatThongKe(){

    let now = new Date();

    let ngay =
    now.getDate().toString().padStart(2,'0')
    + "/"
    + (now.getMonth()+1).toString().padStart(2,'0')
    + "/"
    + now.getFullYear();

    let dataHomNay =
    dsHoTro.filter(x => x.ngay == ngay);

    document.getElementById("tongHomNay").innerText =
    dataHomNay.length;

    document.getElementById("tongHD").innerText =
    dsHoTro.filter(x => x.loai.includes("HD")).length;

    document.getElementById("tongCKS").innerText =
    dsHoTro.filter(x => x.loai.includes("CKS")).length;

    document.getElementById("tongBHXH").innerText =
    dsHoTro.filter(x => x.loai.includes("BHXH")).length;
}

/* ======================= */
/* EXPORT EXCEL */
/* ======================= */

function exportExcel(){

    if(dsHoTro.length === 0){

        alert("Không có dữ liệu");

        return;
    }

    let dataExport = dsHoTro.map(item => ({

        "Mã số thuế": item.mst || "",

        "Số điện thoại": item.sdt || "",

        "Tên doanh nghiệp": item.tencty || "",

        "Loại": item.loai || "",

        "Tên hỗ trợ": "Dũng",

        "Vấn đề": item.vanDe || ""

    }));

    let wb = XLSX.utils.book_new();

    let ws =
    XLSX.utils.json_to_sheet(dataExport);

    ws['!cols'] = [

        { wch: 18 },
        { wch: 18 },
        { wch: 40 },
        { wch: 20 },
        { wch: 18 },
        { wch: 50 }

    ];

    XLSX.utils.book_append_sheet(
    wb,
    ws,
    "HoTroKhachHang"
    );

    XLSX.writeFile(
    wb,
    "du-lieu-ho-tro.xlsx"
    );

    thongBao("Xuất Excel thành công");

}

/* ======================= */
/* THÔNG BÁO */
/* ======================= */

function thongBao(text){

    document.getElementById("msg").innerText =
    text;

    setTimeout(()=>{

        document.getElementById("msg").innerText =
        "";

    },2000);
}

</script>

</body>
</html>
